<!-- Sensor picker — shown only when 2+ sensors are registered -->
<div class="mb-3" x-show="$store.citrasense.sensors.length > 1">
    <label class="form-label small text-muted">Sensor</label>
    <div class="d-flex flex-wrap gap-2">
        <template x-for="s in $store.citrasense.sensors" :key="s.id">
            <button type="button" class="btn btn-sm"
                    :class="s.id === ($store.citrasense.sensors[0]?.id) ? 'btn-primary' : 'btn-outline-secondary'"
                    x-text="s.name">
            </button>
        </template>
    </div>
</div>
